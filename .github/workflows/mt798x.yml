name: mt798x_24_10_CI

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10-6.6

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    permissions: write-all
    runs-on: ubuntu-22.04

    env:
      build_variant: ${{ matrix.build_variant }}
      platform: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      # These builds are heavy and download many shared sources. Running all
      # variants at once has caused hosted runners to disappear mid-step.
      max-parallel: 2
      matrix:
        include:
          - build_variant: mt7981-ax3000
            platform: mt7981

          - build_variant: mt7981-ax3000-dae
            platform: mt7981

          - build_variant: mt7975-ipailna-high-power
            platform: mt7986

          - build_variant: mt7975-ipailna-high-power_dae
            platform: mt7986

          - build_variant: mt7986-ax4200-bpir3_mini
            platform: mt7986

          - build_variant: mt7986-ax6000
            platform: mt7986

          - build_variant: mt7986-ax6000_dae
            platform: mt7986

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@v8
        with:
          swap-size-mb: 512
          temp-reserve-mb: 1
          # Keep enough root space for apt and system package extraction.
          root-reserve-mb: 8192
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Init build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt clean
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt update -y
          sudo apt install -y --no-install-recommends ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang clangd cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev \
          libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5 libncursesw5-dev libreadline-dev \
          libssl-dev libtool lld lldb lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf \
          python3 python3-pip python3-ply python3-docutils qemu-utils re2c rsync scons squashfs-tools subversion swig \
          texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo apt clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Prepare
        run: |
          build_date="$(date +%Y%m%d)"
          image_prefix=immortalwrt-24.10-${build_variant}-scutclient
          echo "image_name=${image_prefix}-${build_date}" >> $GITHUB_ENV
          echo "release_tag=${image_prefix}-${build_date}" >> $GITHUB_ENV

          git clone --depth=1 -b $REPO_BRANCH $REPO_URL openwrt

          cd openwrt
          bash ../01_prepare.sh

          test -f defconfig/${build_variant}.config
          cat defconfig/${build_variant}.config > .config
          bash ../02_add_package.sh
          # Use xz squashfs compression instead of default gzip (20-30% smaller firmware)
          echo "CONFIG_TARGET_SQUASHFS_XZ=y" >> .config
          make defconfig

      - name: Make Download
        run: |
          cd openwrt
          for attempt in 1 2 3; do
            echo "Download attempt ${attempt}/3"
            if timeout 45m make download -j4; then
              exit 0
            fi
            echo "Download attempt ${attempt} failed"
            sleep 30
          done
          echo "Download failed after retries, running serial diagnostic pass..." >&2
          timeout 30m make download -j1 V=s

      - name: Compile
        id: compileopenwrt
        run: |
          cd openwrt
          timeout 4h make -j$(nproc) || {
            echo "Parallel compile failed or timed out, retrying serial build..."
            timeout 2h make -j1 V=s || {
              echo "Compile failed after retry" >&2
              exit 1
            }
          }

      - name: Package
        run: |
          rm -rf ./artifact/
          mkdir -p ./artifact/
          echo "Available target files:"
          find openwrt/bin/targets/mediatek -maxdepth 3 -type f -printf '%p\n' | sort
          mapfile -t images < <(find openwrt/bin/targets/mediatek -maxdepth 3 -type f -name '*squashfs*' | sort)
          if [ "${#images[@]}" -eq 0 ]; then
            echo "No squashfs images found under openwrt/bin/targets/mediatek" >&2
            exit 1
          fi
          cp "${images[@]}" ./artifact/
          cd artifact
          7z a -t7z -m0=lzma2 -mx=9 -md=256m -mfb=273 -ms=on -mmt=on -myx=9 ../${{ env.image_name }}.7z .

      - name: Create release
        id: create_release
        uses: ncipollo/release-action@v1.13.0
        with:
          name: ${{ env.release_tag }}
          allowUpdates: true
          prerelease: false
          tag: ${{ env.release_tag }}
          commit: main
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: ${{ env.image_name }}.7z
